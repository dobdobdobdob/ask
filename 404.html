<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    const path = window.location.pathname.slice(1);
    const skip = ['create','preview','success','profile','faq','dashboard','embed.js','404','CNAME','_redirects','_config.yml','_routes.json'];
    if(path && !skip.includes(path) && !path.includes('.')){
      // Clean slug URL - redirect to profile with slug in path
      window.location.replace('/profile?slug=' + path);
    } else if(!path){
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
