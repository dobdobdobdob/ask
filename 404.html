<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages SPA redirect trick
    // Captures the URL slug and redirects to profile.html with it as a query param
    const slug = window.location.pathname.slice(1);
    if(slug && slug !== '404.html') {
      window.location.replace('/profile.html?slug=' + slug);
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
