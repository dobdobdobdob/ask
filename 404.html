<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    const path = window.location.pathname.slice(1);
    const skip = ['create','preview','success','profile','faq','dashboard','embed.js','404','CNAME'];
    if(path && !skip.includes(path) && !path.includes('.')){
      sessionStorage.setItem('ask_slug', path);
      window.location.replace('/profile');
    } else if(!path){
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
