<script>
const WORKER='https://spring-pine-fd21.thedobrien.workers.dev/';
const ASK_SERVER='https://ask-server.thedobrien.workers.dev';
let systemPrompt='',chatHistory=[],chatLoading=false,chatOpen=false,avatarDataUrl=null;

window.addEventListener('load',async()=>{
  // Try pathname first (clean URL), fall back to ?slug= param
  const pathSlug = window.location.pathname.slice(1).replace('.html','');
  const slug = (pathSlug && pathSlug !== 'profile') ? pathSlug : new URLSearchParams(window.location.search).get('slug');
  if(!slug){window.location.href='/';return;}
  try{
    const res=await fetch(`${ASK_SERVER}/${slug}`);
    if(!res.ok){document.getElementById('notFound').style.display='block';return;}
    const d=await res.json();
    systemPrompt=d.systemPrompt;avatarDataUrl=d.avatar;
    if(d.theme && d.theme !== 'classic') document.documentElement.className = d.theme;
    document.getElementById('profileName').textContent=d.name||'—';
    document.getElementById('profileMeta').textContent=d.meta||[d.title,d.city].filter(Boolean).join(' · ')||'';
    document.getElementById('profileBio').textContent=d.bio||'';
    document.title=`Ask ${d.name}`;
    const fn=d.name.split(' ')[0];
    document.getElementById('chatLabel').textContent=`Ask ${fn}`;
    document.getElementById('cpName').textContent=`Ask ${fn}`;
    if(avatarDataUrl){document.getElementById('profileAvatar').innerHTML=`<img src="${avatarDataUrl}" alt="avatar">`;}
    else{const p=(d.name||'').split(' ').filter(Boolean);const i=p.length>=2?p[0][0]+p[p.length-1][0]:p[0]?.[0]||'?';document.getElementById('profileInitials').textContent=i.toUpperCase();}
    // Socials
    const socialDefs=[{key:'linkedin',label:'LinkedIn'},{key:'github',label:'GitHub'},{key:'portfolio',label:'Portfolio'},{key:'twitter',label:'X'},{key:'tiktok',label:'TikTok'},{key:'instagram',label:'Instagram'}];
    socialDefs.forEach(({key,label})=>{if(d.socials?.[key]){const a=document.createElement('a');a.href=d.socials[key].startsWith('http')?d.socials[key]:'https://'+d.socials[key];a.className='social-pill';a.target='_blank';a.textContent=label;document.getElementById('profileSocials').appendChild(a);}});
    if(d.email){const a=document.createElement('a');const subject=encodeURIComponent('Reaching out via Ask — '+d.name);a.href='mailto:'+d.email+'?subject='+subject;a.className='social-pill';a.textContent='✉ Email Me';document.getElementById('profileSocials').appendChild(a);}
    // Experience
    if(d.experience?.length>0){const list=document.getElementById('expList');d.experience.forEach(job=>{const card=document.createElement('div');card.className='exp-card';const bullets=(job.bullets||[]).map(b=>`<li>${b}</li>`).join('');card.innerHTML=`<div class="exp-header"><div><div class="exp-company">${job.company||''}</div><div class="exp-role">${job.role||''}</div></div><div class="exp-right"><div class="exp-dates">${job.dates||''}</div><div class="exp-location">${job.location||''}</div></div></div>${bullets?`<ul class="exp-bullets">${bullets}</ul>`:''}`;list.appendChild(card);});}
    else{document.getElementById('expSection').style.display='none';}
    // Skills
    if(d.skills?.length>0){const wrap=document.getElementById('skillsList');d.skills.forEach(s=>{const p=document.createElement('span');p.className='skill-pill';p.textContent=s;wrap.appendChild(p);});}
    else{document.getElementById('skillsSection').style.display='none';}
    document.getElementById('profileHero').style.display='block';
    document.getElementById('mainContent').style.display='block';
    const toggle=document.getElementById('chat-toggle');toggle.style.display='flex';
    addMsg('assistant',`Hi! I'm ${d.name}'s AI assistant. Ask me anything about their background, experience, or skills.`);
  }catch(e){document.getElementById('notFound').style.display='block';}
});

function toggleChat(){chatOpen=!chatOpen;document.getElementById('chat-panel').classList.toggle('open',chatOpen);if(chatOpen)setTimeout(()=>document.getElementById('cpInput').focus(),300);}
function getInit(){const n=document.getElementById('profileName').textContent;const p=n.split(' ').filter(Boolean);return(p.length>=2?p[0][0]+p[p.length-1][0]:p[0]?.[0]||'?').toUpperCase();}
function addMsg(role,text){const wrap=document.getElementById('cpMessages');const div=document.createElement('div');div.className='cmsg '+role;const av=document.createElement('div');av.className='cmsg-av';if(role==='assistant'){if(avatarDataUrl)av.innerHTML=`<img src="${avatarDataUrl}" alt="avatar">`;else av.textContent=getInit();}else{av.textContent='You';av.style.fontSize='0.5rem';av.style.color='var(--text3)';}const b=document.createElement('div');b.className='cmsg-bub';b.textContent=text;div.appendChild(av);div.appendChild(b);wrap.appendChild(div);wrap.scrollTop=wrap.scrollHeight;}
function showTyping(){const wrap=document.getElementById('cpMessages');const div=document.createElement('div');div.className='cmsg assistant';div.id='typingMsg';const av=document.createElement('div');av.className='cmsg-av';if(avatarDataUrl)av.innerHTML=`<img src="${avatarDataUrl}" alt="avatar">`;else av.textContent=getInit();div.appendChild(av);const t=document.createElement('div');t.className='cp-typing';t.innerHTML='<span></span><span></span><span></span>';div.appendChild(t);wrap.appendChild(div);wrap.scrollTop=wrap.scrollHeight;}
function askSugg(btn){document.getElementById('cpSuggs').style.display='none';document.getElementById('cpInput').value=btn.textContent;sendChat();}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
async function sendChat(){const input=document.getElementById('cpInput');const text=input.value.trim();if(!text||chatLoading)return;chatLoading=true;document.getElementById('cpSend').disabled=true;document.getElementById('cpSuggs').style.display='none';input.value='';input.style.height='auto';addMsg('user',text);chatHistory.push({role:'user',content:text});showTyping();try{const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:systemPrompt,messages:chatHistory})});const data=await res.json();const reply=data.content?.[0]?.text||"I'm having connection issues.";document.getElementById('typingMsg')?.remove();addMsg('assistant',reply);chatHistory.push({role:'assistant',content:reply});}catch(e){document.getElementById('typingMsg')?.remove();addMsg('assistant','Connection issue — please try again.');}chatLoading=false;document.getElementById('cpSend').disabled=false;}

// GDPR
function gdprInit(){
  const consent = localStorage.getItem('gdpr_consent');
  if(!consent) setTimeout(()=>document.getElementById('gdpr-banner').classList.add('show'), 1500);
  if(consent === 'declined') window['ga-disable-G-Y6Y16FEG2H'] = true;
}
function gdprAccept(){ localStorage.setItem('gdpr_consent','accepted'); document.getElementById('gdpr-banner').classList.remove('show'); }
function gdprDecline(){ localStorage.setItem('gdpr_consent','declined'); window['ga-disable-G-Y6Y16FEG2H']=true; document.getElementById('gdpr-banner').classList.remove('show'); }
gdprInit();
</script>
