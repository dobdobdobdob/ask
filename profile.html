<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask — Personal AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #FFFFFF; --off-white: #F7F6F3; --light: #EEECE8;
      --border: #E2DED8; --text1: #1A1A1A; --text2: #555550;
      --text3: #999990; --accent: #CCFF00; --accent-dark: #8AB300; --black: #111111;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--text1); min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.5rem 4rem; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.25rem; color: var(--text1); text-decoration: none; letter-spacing: -0.02em; }
    .nav-logo span { display: inline-block; background: var(--accent); color: var(--black); padding: 0 6px; margin-left: 2px; font-style: italic; }
    .nav-create { font-size: 0.78rem; color: var(--text3); text-decoration: none; transition: color 0.2s; }
    .nav-create:hover { color: var(--text1); }

    /* HERO */
    .profile-hero { background: var(--off-white); border-bottom: 1px solid var(--border); padding: 7rem 4rem 3.5rem; }
    .profile-hero-inner { max-width: 860px; margin: 0 auto; display: flex; gap: 2.5rem; align-items: flex-start; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 1px solid var(--border); background: var(--light); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-avatar-initials { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--text3); }
    .profile-info { flex: 1; }
    .profile-name { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.3rem; }
    .profile-meta { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); margin-bottom: 1rem; }
    .profile-bio { font-size: 0.95rem; color: var(--text2); line-height: 1.8; max-width: 560px; font-weight: 300; }
    .profile-socials { display: flex; gap: 0.75rem; margin-top: 1.25rem; flex-wrap: wrap; }
    .social-pill { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.35rem 1rem; background: var(--white); border: 1px solid var(--border); color: var(--text2); text-decoration: none; border-radius: 100px; transition: all 0.2s; }
    .social-pill:hover { border-color: var(--accent-dark); color: var(--text1); }

    /* MAIN CONTENT */
    .main-content { max-width: 860px; margin: 0 auto; width: 100%; padding: 3.5rem 4rem 8rem; flex: 1; }

    /* EXPERIENCE */
    .section-tag { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.75rem; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1.5rem; }

    .exp-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 3.5rem; }

    .exp-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 4px; padding: 1.75rem 2rem;
      position: relative; overflow: hidden; transition: all 0.25s;
    }
    .exp-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: transparent; transition: background 0.25s; }
    .exp-card:hover { border-color: #D0D0C8; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    .exp-card:hover::before { background: var(--accent); }

    .exp-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.85rem; flex-wrap: wrap; gap: 0.5rem; }
    .exp-left {}
    .exp-company { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent-dark); margin-bottom: 0.25rem; }
    .exp-role { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; color: var(--text1); }
    .exp-right { text-align: right; flex-shrink: 0; }
    .exp-dates { font-size: 0.75rem; color: var(--text3); }
    .exp-location { font-size: 0.72rem; color: var(--text3); margin-top: 0.1rem; }

    .exp-bullets { list-style: none; margin-top: 0.75rem; }
    .exp-bullets li { font-size: 0.85rem; color: var(--text2); line-height: 1.7; padding-left: 1.25rem; position: relative; margin-bottom: 0.35rem; font-weight: 300; }
    .exp-bullets li::before { content: '›'; position: absolute; left: 0; color: var(--accent-dark); font-size: 1rem; line-height: 1.6; }

    /* SKILLS */
    .skills-wrap { margin-bottom: 3.5rem; }
    .skills-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .skill-pill { font-size: 0.78rem; font-weight: 400; padding: 0.4rem 0.9rem; background: var(--off-white); border: 1px solid var(--border); color: var(--text2); border-radius: 100px; transition: all 0.2s; }
    .skill-pill:hover { background: var(--light); border-color: #C8C8C0; color: var(--text1); }

    /* FLOATING CHAT BUTTON */
    #chat-toggle {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 500;
      background: var(--black); color: var(--white);
      border: none; border-radius: 50px;
      padding: 0.85rem 1.75rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 0.6rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      transition: all 0.2s;
    }
    #chat-toggle:hover { background: var(--accent); color: var(--black); }
    .chat-toggle-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulseDot 2s ease-in-out infinite; }
    @keyframes pulseDot { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.3); opacity:0.7; } }

    /* CHAT PANEL */
    #chat-panel {
      position: fixed; bottom: 5.5rem; right: 2rem; z-index: 499;
      width: 380px; height: 520px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      transform: scale(0.95) translateY(10px);
      opacity: 0; pointer-events: none;
      transition: all 0.25s ease;
      overflow: hidden;
    }
    #chat-panel.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: auto; }

    .chat-panel-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--off-white); }
    .chat-panel-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; }
    .chat-panel-sub { font-size: 0.65rem; color: var(--text3); letter-spacing: 0.08em; margin-top: 1px; }
    .chat-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1.1rem; line-height: 1; padding: 0.2rem; transition: color 0.2s; }
    .chat-close:hover { color: var(--text1); }

    .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; scroll-behavior: smooth; }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cmsg { display: flex; gap: 0.5rem; }
    .cmsg.user { flex-direction: row-reverse; }
    .cmsg-avatar { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); background: var(--light); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 0.55rem; font-weight: 700; color: var(--text3); flex-shrink: 0; margin-top: 2px; overflow: hidden; }
    .cmsg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .cmsg-bubble { padding: 0.65rem 0.9rem; border-radius: 2px; font-size: 0.8rem; line-height: 1.6; max-width: 85%; }
    .cmsg.assistant .cmsg-bubble { background: var(--off-white); border: 1px solid var(--border); color: var(--text1); }
    .cmsg.user .cmsg-bubble { background: var(--black); color: var(--white); }

    .chat-typing { display: flex; gap: 4px; align-items: center; padding: 0.65rem 0.9rem; background: var(--off-white); border: 1px solid var(--border); width: fit-content; border-radius: 2px; }
    .chat-typing span { width: 5px; height: 5px; background: var(--accent-dark); border-radius: 50%; animation: typingBounce 1.2s ease-in-out infinite; }
    .chat-typing span:nth-child(2){ animation-delay: 0.2s; }
    .chat-typing span:nth-child(3){ animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{ transform:translateY(0); opacity:0.4; } 30%{ transform:translateY(-4px); opacity:1; } }

    .chat-suggestions-row { padding: 0.5rem 0.75rem; display: flex; gap: 0.4rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--white); }
    .chat-sugg { font-size: 0.62rem; padding: 0.3rem 0.7rem; background: var(--off-white); border: 1px solid var(--border); color: var(--text2); border-radius: 100px; cursor: pointer; transition: all 0.2s; }
    .chat-sugg:hover { border-color: var(--accent-dark); color: var(--text1); }

    .chat-input-row { padding: 0.75rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; flex-shrink: 0; }
    .chat-input { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; background: var(--off-white); border: 1px solid var(--border); color: var(--text1); padding: 0.55rem 0.85rem; outline: none; border-radius: 2px; resize: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: var(--accent-dark); }
    .chat-input::placeholder { color: var(--text3); }
    .chat-send { width: 34px; height: 34px; background: var(--black); border: none; border-radius: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
    .chat-send:hover { background: var(--accent); }
    .chat-send:disabled { opacity: 0.3; cursor: not-allowed; }

    /* NOT FOUND */
    .not-found { text-align: center; padding: 8rem 2rem; flex: 1; }
    .not-found h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 1rem; }
    .not-found p { color: var(--text2); font-size: 0.95rem; }

    /* FOOTER */
    footer { background: var(--black); border-top: 1px solid rgba(255,255,255,0.08); padding: 2rem 4rem; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1rem; color: rgba(255,255,255,0.4); text-decoration: none; }
    .footer-logo span { background: var(--accent); color: var(--black); padding: 0 5px; font-style: italic; }
    .footer-copy { font-size: 0.72rem; color: rgba(255,255,255,0.25); letter-spacing: 0.05em; }

    @media(max-width:768px){
      nav{padding:1.25rem 1.5rem;}
      .profile-hero{padding:6rem 1.5rem 2.5rem;}
      .profile-hero-inner{flex-direction:column;gap:1.25rem;}
      .main-content{padding:2.5rem 1.5rem 8rem;}
      #chat-panel{width:calc(100vw - 2rem);right:1rem;}
      footer{flex-direction:column;gap:1rem;padding:1.5rem;}
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Ask<span>.</span></a>
  <a href="/" class="nav-create">Create yours →</a>
</nav>

<div id="profileHero" class="profile-hero" style="display:none;">
  <div class="profile-hero-inner">
    <div class="profile-avatar" id="profileAvatar">
      <div class="profile-avatar-initials" id="profileInitials">?</div>
    </div>
    <div class="profile-info">
      <div class="profile-name" id="profileName"></div>
      <div class="profile-meta" id="profileMeta"></div>
      <div class="profile-bio" id="profileBio"></div>
      <div class="profile-socials" id="profileSocials"></div>
    </div>
  </div>
</div>

<div class="main-content" id="mainContent" style="display:none;">

  <!-- EXPERIENCE -->
  <div id="expSection">
    <p class="section-tag">Experience</p>
    <h2 class="section-title">Where I've Shipped</h2>
    <div class="exp-list" id="expList"></div>
  </div>

  <!-- SKILLS -->
  <div class="skills-wrap" id="skillsSection">
    <p class="section-tag">Skills</p>
    <h2 class="section-title">What I Bring</h2>
    <div class="skills-pills" id="skillsList"></div>
  </div>

</div>

<div id="notFound" class="not-found" style="display:none;">
  <h2>Profile not found.</h2>
  <p>This assistant page doesn't exist or may have expired.</p>
</div>

<!-- FLOATING CHAT BUTTON -->
<button id="chat-toggle" onclick="toggleChat()" style="display:none;">
  <div class="chat-toggle-dot"></div>
  <span id="chatToggleLabel">Ask Me</span>
</button>

<!-- CHAT PANEL -->
<div id="chat-panel">
  <div class="chat-panel-header">
    <div>
      <div class="chat-panel-name" id="chatPanelName">AI Assistant</div>
      <div class="chat-panel-sub">Powered by Claude AI</div>
    </div>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-suggestions-row" id="chatSuggestionsRow">
    <button class="chat-sugg" onclick="askSuggestion(this)">Experience summary</button>
    <button class="chat-sugg" onclick="askSuggestion(this)">Key skills</button>
    <button class="chat-sugg" onclick="askSuggestion(this)">Why hire them?</button>
    <button class="chat-sugg" onclick="askSuggestion(this)">Biggest win</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chatInput" placeholder="Ask anything..." rows="1"
      onkeydown="chatKey(event)"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
    <button class="chat-send" id="chatSend" onclick="sendChat()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<footer>
  <a href="/" class="footer-logo">Ask<span>.</span></a>
  <div class="footer-copy">Powered by Menos Labs · menos-labs.com</div>
</footer>

<script>
const WORKER = 'https://spring-pine-fd21.thedobrien.workers.dev/';
const ASK_SERVER = 'https://ask-server.thedobrien.workers.dev';
let systemPrompt='', chatHistory=[], chatLoading=false, avatarDataUrl=null, chatOpen=false;

window.addEventListener('load', async () => {
  const slug = window.location.pathname.slice(1);
  if(!slug){ window.location.href='/'; return; }

  try {
    const res = await fetch(`${ASK_SERVER}/${slug}`);
    if(!res.ok){ document.getElementById('notFound').style.display='block'; return; }
    const data = await res.json();

    systemPrompt = data.systemPrompt;
    avatarDataUrl = data.avatar;

    // Profile hero
    document.getElementById('profileName').textContent = data.name||'—';
    document.getElementById('profileMeta').textContent = data.meta||'';
    document.getElementById('profileBio').textContent = data.bio||'';
    document.title = `Ask ${data.name}`;

    if(avatarDataUrl){
      document.getElementById('profileAvatar').innerHTML=`<img src="${avatarDataUrl}" alt="avatar">`;
    } else {
      const p=(data.name||'').split(' ').filter(Boolean);
      const i=p.length>=2?p[0][0]+p[p.length-1][0]:p[0]?.[0]||'?';
      document.getElementById('profileInitials').textContent=i.toUpperCase();
    }

    if(data.linkedin){
      const a=document.createElement('a');
      a.href=data.linkedin.startsWith('http')?data.linkedin:'https://'+data.linkedin;
      a.className='social-pill';a.target='_blank';a.textContent='LinkedIn';
      document.getElementById('profileSocials').appendChild(a);
    }

    // Experience
    if(data.experience && data.experience.length>0){
      const list=document.getElementById('expList');
      data.experience.forEach(job=>{
        const card=document.createElement('div');card.className='exp-card';
        const bullets=(job.bullets||[]).map(b=>`<li>${b}</li>`).join('');
        card.innerHTML=`
          <div class="exp-header">
            <div class="exp-left">
              <div class="exp-company">${job.company||''}</div>
              <div class="exp-role">${job.role||''}</div>
            </div>
            <div class="exp-right">
              <div class="exp-dates">${job.dates||''}</div>
              <div class="exp-location">${job.location||''}</div>
            </div>
          </div>
          ${bullets?`<ul class="exp-bullets">${bullets}</ul>`:''}`;
        list.appendChild(card);
      });
    } else {
      document.getElementById('expSection').style.display='none';
    }

    // Skills
    if(data.skills && data.skills.length>0){
      const wrap=document.getElementById('skillsList');
      data.skills.forEach(skill=>{
        const pill=document.createElement('span');
        pill.className='skill-pill';pill.textContent=skill;
        wrap.appendChild(pill);
      });
    } else {
      document.getElementById('skillsSection').style.display='none';
    }

    // Show everything
    document.getElementById('profileHero').style.display='block';
    document.getElementById('mainContent').style.display='block';

    // Chat button
    const firstName=data.name.split(' ')[0];
    document.getElementById('chatToggleLabel').textContent=`Ask ${firstName}`;
    document.getElementById('chatPanelName').textContent=`Ask ${firstName}`;
    document.getElementById('chat-toggle').style.display='flex';

    // Initial chat message
    addMessage('assistant',`Hi! I'm ${data.name}'s AI assistant. Ask me anything about their background, experience, or skills.`);

  } catch(e) {
    document.getElementById('notFound').style.display='block';
  }
});

function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chat-panel').classList.toggle('open',chatOpen);
  if(chatOpen) setTimeout(()=>document.getElementById('chatInput').focus(),300);
}

function getInitials(){
  const n=document.getElementById('profileName').textContent;
  const p=n.split(' ').filter(Boolean);
  return(p.length>=2?p[0][0]+p[p.length-1][0]:p[0]?.[0]||'?').toUpperCase();
}

function addMessage(role,text){
  const wrap=document.getElementById('chatMessages');
  const div=document.createElement('div');div.className='cmsg '+role;
  const av=document.createElement('div');av.className='cmsg-avatar';
  if(role==='assistant'){
    if(avatarDataUrl)av.innerHTML=`<img src="${avatarDataUrl}" alt="avatar">`;
    else av.textContent=getInitials();
  }else{av.textContent='You';av.style.fontSize='0.5rem';av.style.color='var(--text3)';}
  const bubble=document.createElement('div');bubble.className='cmsg-bubble';bubble.textContent=text;
  div.appendChild(av);div.appendChild(bubble);wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
}

function showTyping(){
  const wrap=document.getElementById('chatMessages');
  const div=document.createElement('div');div.className='cmsg assistant';div.id='typingMsg';
  const av=document.createElement('div');av.className='cmsg-avatar';
  if(avatarDataUrl)av.innerHTML=`<img src="${avatarDataUrl}" alt="avatar">`;
  else av.textContent=getInitials();
  div.appendChild(av);
  const t=document.createElement('div');t.className='chat-typing';
  t.innerHTML='<span></span><span></span><span></span>';
  div.appendChild(t);wrap.appendChild(div);wrap.scrollTop=wrap.scrollHeight;
}

function askSuggestion(btn){
  document.getElementById('chatSuggestionsRow').style.display='none';
  document.getElementById('chatInput').value=btn.textContent;
  sendChat();
}

function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}

async function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text||chatLoading)return;
  chatLoading=true;document.getElementById('chatSend').disabled=true;
  document.getElementById('chatSuggestionsRow').style.display='none';
  input.value='';input.style.height='auto';
  addMessage('user',text);chatHistory.push({role:'user',content:text});showTyping();
  try{
    const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:systemPrompt,messages:chatHistory})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||"I'm having connection issues. Please try again.";
    document.getElementById('typingMsg')?.remove();
    addMessage('assistant',reply);chatHistory.push({role:'assistant',content:reply});
  }catch(e){
    document.getElementById('typingMsg')?.remove();
    addMessage('assistant','Connection issue — please try again.');
  }
  chatLoading=false;document.getElementById('chatSend').disabled=false;
}
</script>
</body>
</html>
